<div
  class="app-shell min-h-screen"
  [class.has-results]="hasResults()"
>
  <header class="app-header relative overflow-hidden px-6 text-center">
    <img class="app-logo relative mx-auto object-cover" src="/image.png" alt="wish" />
    <p
      class="app-kicker relative text-xs font-semibold uppercase tracking-[0.36em]"
      style="color: var(--color-muted)"
    >
      Your Personal Travel Wishlist
    </p>
    <p
      class="app-tagline relative mx-auto max-w-xl text-base leading-7 md:text-lg"
      style="color: var(--color-muted)"
    >
      Discover and save places you dream of visiting
    </p>
    <div
      class="relative mx-auto mt-7 h-px w-24"
      style="background: linear-gradient(90deg, transparent, var(--color-primary), transparent)"
    ></div>
  </header>

  <main class="app-main mx-auto max-w-6xl px-4">
    <app-search
      [wishlistCount]="wishlistCount()"
      [isWishlistPulsing]="isWishlistPulsing()"
      (hasResultsChange)="setHasResults($event)"
      (openWishlistRequested)="openWishlist()"
    />
  </main>

  <app-wishlist [isOpen]="isDrawerOpen()" (closed)="closeWishlist()" />
</div>
